<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hào Khí Du Hiệp - Đăng Ký Tham Gia Miss Mister</title>
    <meta name="description" content="Trang đăng ký tham gia cuộc thi Miss & Mister Hào Khí Du Hiệp MG19">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ======= HEADER ======= -->
    <header class="site-header sticky-top">
        <div class="header-inner d-flex align-items-center justify-content-between px-3 mx-auto h-100">
            <div class="header-logo">
                <img src="assets/iconapp.png" alt="Hào Khí Du Hiệp">
            </div>
            <div class="header-right d-flex align-items-center gap-3">
                <a href="#" class="hd-icon"><i class="bi bi-house-door-fill"></i></a>
                <a href="#" class="hd-icon"><i class="bi bi-facebook"></i></a>
                <button class="btn-dangnhap">
                    <img src="assets/đn.png" alt="Đăng nhập">
                </button>
            </div>
        </div>
    </header>

    <!-- ======= TOÀN BỘ TRANG ======= -->
    <div class="page-bg d-flex flex-column align-items-center w-100">

        <!-- === HERO SECTION === -->
        <section class="hero-section d-flex justify-content-center w-100 pt-4">
            <div class="hero-inner d-flex flex-column align-items-center w-100">

                <!-- Logo game -->
                <div class="hero-logo">
                    <img src="assets/Logo-HaoKhiDuHiep.png" alt="Logo game">
                </div>

                <!-- Banner chữ Miss Mister -->
                <div class="hero-banner text-center mt-n2">
                    <img src="assets/text.png" alt="Miss Mister Hào Khí Du Hiệp">
                </div>

                <!-- Nav bar + nút tham gia -->
                <div class="nav-wrap position-relative w-100 mt-5 mb-2">
                    <button class="btn-join position-absolute" id="joinNowBtn">
                        <img src="assets/votengay.png" alt="Tham gia ngay">
                    </button>
                    <div class="nav-bar d-flex align-items-center justify-content-between">
                        <div class="nav-left d-flex align-items-center gap-4">
                            <button class="nav-item" id="rulesBtn">
                                <img src="assets/thele.png" alt="Thể Lệ">
                            </button>
                            <button class="nav-item" id="guideBtn">
                                <img src="assets/hd.png" alt="Hướng Dẫn">
                            </button>
                        </div>
                        <div class="nav-right d-flex align-items-center gap-4">
                            <a href="#" class="nav-item">
                                <img src="assets/taigame.png" alt="Tải Game">
                            </a>
                            <a href="#" class="nav-item">
                                <img src="assets/napthe.png" alt="Nạp Thẻ">
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- === FORM ĐĂNG KÝ === -->
        <section class="register-section d-flex flex-column align-items-center w-100 pb-5" id="registerSection">
            <!-- Tiêu đề -->
            <div class="register-heading text-center py-4">
                <img src="assets/đkdt.png" alt="Đăng ký dự thi">
            </div>

            <!-- Card form -->
            <div class="register-card w-100">
                <form id="registerForm" novalidate>
                    <div class="form-body d-flex justify-content-between align-items-start gap-4">

                        <!-- === CỘT TRÁI: ẢNH === -->
                        <div class="col-photos d-flex flex-column flex-shrink-0">
                            <!-- Ảnh chính -->
                            <div class="photo-main position-relative overflow-hidden" id="photoMainWrap"
                                onclick="triggerUpload('mainPhotoInput')" title="Nhấn để tải ảnh">
                                <input type="file" id="mainPhotoInput" accept="image/*" class="d-none">
                                <img src="assets/themanh.png" id="mainPhotoPreview" alt="Ảnh dự thi chính"
                                    class="photo-main-img w-100 h-100">
                                <div
                                    class="photo-main-hover position-absolute inset-0 d-flex flex-column align-items-center justify-content-center gap-2">
                                    <i class="bi bi-camera-fill"></i>
                                    <span>THAY ĐỔI ẢNH</span>
                                </div>
                            </div>

                            <!-- 3 ảnh phụ -->
                            <div class="photo-subs d-flex mt-0">
                                <div class="photo-sub position-relative overflow-hidden"
                                    onclick="triggerUpload('sub1')">
                                    <input type="file" id="sub1" accept="image/*" class="d-none">
                                    <img src="assets/themanhnho.png" id="subPrev1" alt="Ảnh phụ 1" class="w-100 h-100">
                                    <div
                                        class="sub-hover position-absolute inset-0 d-flex align-items-center justify-content-center">
                                        <i class="bi bi-plus-lg"></i>
                                    </div>
                                </div>
                                <div class="photo-sub position-relative overflow-hidden"
                                    onclick="triggerUpload('sub2')">
                                    <input type="file" id="sub2" accept="image/*" class="d-none">
                                    <img src="assets/themanhnho.png" id="subPrev2" alt="Ảnh phụ 2" class="w-100 h-100">
                                    <div
                                        class="sub-hover position-absolute inset-0 d-flex align-items-center justify-content-center">
                                        <i class="bi bi-plus-lg"></i>
                                    </div>
                                </div>
                                <div class="photo-sub position-relative overflow-hidden"
                                    onclick="triggerUpload('sub3')">
                                    <input type="file" id="sub3" accept="image/*" class="d-none">
                                    <img src="assets/themanhnho.png" id="subPrev3" alt="Ảnh phụ 3" class="w-100 h-100">
                                    <div
                                        class="sub-hover position-absolute inset-0 d-flex align-items-center justify-content-center">
                                        <i class="bi bi-plus-lg"></i>
                                    </div>
                                </div>
                            </div>

                            <p class="note-text text-center mt-2">*Bắt buộc phải đăng ký đủ 4 ảnh dự thi</p>
                        </div>

                        <!-- === CỘT PHẢI: THÔNG TIN === -->
                        <div class="col-info d-flex flex-column flex-shrink-0 gap-3">
                            <!-- Thông tin nhân vật -->
                            <div class="char-info">
                                <p>Nhân vật <span class="val-yellow">Lục Trà Bạc Hà</span></p>
                                <p>Bang hội <span class="val-yellow">Lạc Viên</span></p>
                                <p>Máy chủ: <span class="val-yellow">S1 - Lý Bạch</span></p>
                            </div>

                            <!-- Chọn giới tính -->
                            <div class="gender-row d-flex align-items-center gap-4">
                                <label class="gender-opt d-flex align-items-center gap-2">
                                    <input type="radio" name="gender" value="Miss" id="radioMiss">
                                    <span class="g-dot flex-shrink-0"></span>
                                    <img src="assets/thimiss.png" alt="Thí Miss" class="g-img">
                                </label>
                                <label class="gender-opt d-flex align-items-center gap-2">
                                    <input type="radio" name="gender" value="Mister" id="radioMister">
                                    <span class="g-dot flex-shrink-0"></span>
                                    <img src="assets/thimisster.png" alt="Thí Mister" class="g-img">
                                </label>
                            </div>

                            <!-- Ô nhập: Địa chỉ -->
                            <div class="ibox ibox-full">
                                <input type="text" id="addressInput" placeholder="Nhập địa chỉ liên hệ nhận thưởng"
                                    required>
                            </div>

                            <!-- Ô nhập: SĐT + Khu vực -->
                            <div class="ibox-row d-flex gap-2">
                                <div class="ibox ibox-half">
                                    <input type="tel" id="phoneInput" placeholder="Nhập số điện thoại" required
                                        pattern="[0-9]{10,11}">
                                </div>
                                <div class="ibox ibox-half">
                                    <select id="regionSelect" required>
                                        <option value="" disabled selected hidden>Chọn khu vực</option>
                                        <option value="Miền Bắc">Miền Bắc</option>
                                        <option value="Miền Trung">Miền Trung</option>
                                        <option value="Miền Nam">Miền Nam</option>
                                    </select>
                                </div>
                            </div>

                            <!-- CMND/CCCD -->
                            <p class="cmnd-label fw-semibold">Nhập ảnh CMND/CCCD mặt trước và sau</p>
                            <div class="cmnd-row d-flex">
                                <div class="cmnd-box position-relative overflow-hidden"
                                    onclick="triggerUpload('cmndFront')">
                                    <input type="file" id="cmndFront" accept="image/*" class="d-none">
                                    <img src="assets/mattruoc.png" id="cmndFrontPrev" alt="Mặt trước"
                                        class="w-100 h-100">
                                    <div
                                        class="cmnd-hover position-absolute inset-0 d-flex align-items-center justify-content-center gap-1">
                                        <i class="bi bi-upload"></i> Mặt trước
                                    </div>
                                </div>
                                <div class="cmnd-box position-relative overflow-hidden"
                                    onclick="triggerUpload('cmndBack')">
                                    <input type="file" id="cmndBack" accept="image/*" class="d-none">
                                    <img src="assets/matsau.png" id="cmndBackPrev" alt="Mặt sau" class="w-100 h-100">
                                    <div
                                        class="cmnd-hover position-absolute inset-0 d-flex align-items-center justify-content-center gap-1">
                                        <i class="bi bi-upload"></i> Mặt sau
                                    </div>
                                </div>
                            </div>

                            <!-- Ô nhập: Giới thiệu -->
                            <div class="ibox ibox-full ibox-tall">
                                <textarea id="introInput" placeholder="Nhập nội dung giới thiệu (không quá 300 kí tự)"
                                    maxlength="300" required></textarea>
                            </div>

                            <!-- Ô nhập: Video -->
                            <div class="ibox ibox-full">
                                <input type="url" id="videoInput" placeholder="Nhập video dự thi" required>
                            </div>

                            <!-- Nút hành động -->
                            <div class="action-row d-flex gap-3 mt-1">
                                <button type="submit" class="btn-act">
                                    <img src="assets/buttondongy.png" alt="Đồng ý">
                                </button>
                                <button type="button" class="btn-act" onclick="resetForm()">
                                    <img src="assets/buttonhuybo.png" alt="Hủy bỏ">
                                </button>
                            </div>
                        </div>

                    </div><!-- end form-body -->
                </form>
            </div><!-- end register-card -->
        </section>

    </div><!-- end page-bg -->

    <!-- ======= FOOTER ======= -->
    <footer class="site-footer text-center py-3 w-100">
        <p class="mb-0">&copy; 2026 Hào Khí Du Hiệp. All rights reserved.</p>
    </footer>

    <!-- ======= POPUP: THỂ LỆ ======= -->
    <div class="popup-overlay" id="rulesModal">
        <div class="popup-box popup-img-bg" style="--popup-bg: url('assets/popup_thele.png');">
            <button class="popup-close position-absolute d-flex align-items-center justify-content-center"
                onclick="closeModal('rulesModal')"><i class="bi bi-x-lg"></i></button>
        </div>
    </div>

    <!-- ======= POPUP: HƯỚNG DẪN ======= -->
    <div class="popup-overlay" id="guideModal">
        <div class="popup-box popup-img-bg" style="--popup-bg: url('assets/popup_huongdan.png');">
            <button class="popup-close position-absolute d-flex align-items-center justify-content-center"
                onclick="closeModal('guideModal')"><i class="bi bi-x-lg"></i></button>
        </div>
    </div>

    <!-- ======= POPUP: THÀNH CÔNG ======= -->
    <div class="popup-overlay" id="successModal">
        <div class="popup-box popup-img-bg" style="--popup-bg: url('assets/popup_dangkithanhcong.png');">
            <button id="successModalCloseBtn" class="popup-close position-absolute" aria-label="Đóng popup"></button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
