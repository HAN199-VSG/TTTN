<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang chuyển hướng...</title>
    <meta http-equiv="refresh" content="0; url=pages/Nap_game.html">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0b0c10;
            color: #c5c6c7;
            font-family: 'Be Vietnam Pro', sans-serif;
            display: flex;
            align-content: center;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
            text-align: center;
        }
        .loader {
            border: 4px solid #1f2833;
            border-top: 4px solid #45f3ff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a {
            color: #66fcf1;
            text-decoration: none;
            font-weight: 600;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p>Đang chuyển hướng đến cổng nạp game MyE...</p>
    <p>Nếu trang không tự chuyển, vui lòng bấm <a href="pages/Nap_game.html">vào đây</a>.</p>
</body>
</html>
